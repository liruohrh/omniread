id: sao-light-novel
name: 刀剑神域轻小说
base_url: https://example.com
content_type: novel

book_detail:
  title: ["@css:.title"]
  author: ["@css:.author a"]
  cover: ["@css:.cover@data-src"]
  description: ["@css:.description"]
  status: ["@css:.status"]
  tags: ["@js:(function() { let tags = $$('.tag'); let result = []; for(let i=0; i<tags.length; i++) { result.push(text(tags[i])); } return result; })()"]

chapter_list:
  list: [".chapter-item"]
  id: ["@css:.chapter-item@data-chapter-id"]
  title: ["@css:.chapter-title"]
  url_pattern: ["@css:a@href"]
  date: ["@css:.chapter-date"]

content:
  title: ["@css:h1"]
  content: ["@css:#content"]
  filter: ["@js:(function() { let ads = $$('.ad, .advertisement'); for(let i=0; i<ads.length; i++) { ads[i].remove(); } return true; })()"]
