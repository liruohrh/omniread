id: zhetian-novel
name: 遮天小说
base_url: https://example.com
content_type: novel

book_detail:
  title: ["@css:.novel-title"]
  author: ["@css:.author a"]
  cover: ["@css:.novel-cover@data-src"]
  description: ["@css:.intro-content"]
  status: ["@css:.status"]
  tags:
    [
      "@js:(function() { let tags = $$('.tag'); let result = []; for(let i=0; i<tags.length; i++) { result.push(text(tags[i])); } return result; })()",
    ]

chapter_list:
  list: [".chapter-item"]
  id: ["@css:.chapter-item@data-chapter-id"]
  title: ["@css:.chapter-title"]
  url_pattern: ["@css:a@href"]
  date: ["@css:.update-time"]
  next_page: ["@css:.chapter-pagination .next@href"]
  has_next_page: ["@css:.chapter-pagination .next:not(.disabled)"]

content:
  content: ["@css:#content"]
  next_page: ["@css:.next-page@href"]
  has_next_page: ["@css:.next-page:not(.disabled)"]

# 规则数组示例 - 用于复杂解析
rules:
  - "@css:.novel-info-section" # 先提取小说信息区域
  - "@js:(function() { return JSON.stringify({title: text($('.novel-title')), author: text($('.author a'))}); })()" # 转换为JSON
  - "@json:$.title" # 从JSON中提取标题
